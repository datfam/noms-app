<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOMS - Visual Food Journal & Sticker Diary</title>
    <link rel="icon" type="image/png" href="noms_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #D4735E; --bg: #FAF9F7; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .hero { text-align: center; margin-bottom: 40px; }
        .main-logo { width: 120px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(212, 115, 94, 0.3)); transition: transform 0.3s ease; }
        .main-logo:hover { transform: scale(1.05) rotate(5deg); }
        h1 { color: var(--primary); font-size: 3.5rem; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .tagline { color: #666; font-size: 1.2rem; margin-top: 10px; }
        .store-buttons { display: flex; gap: 16px; justify-content: center; margin: 32px 0 48px 0; flex-wrap: wrap; }
        .store-btn { display: inline-flex; align-items: center; gap: 12px; padding: 14px 28px; border-radius: 16px; text-decoration: none; color: white; font-family: 'Inter', sans-serif; transition: all 0.3s ease; background: #000; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .store-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
        .store-btn.coming-soon { opacity: 0.6; cursor: default; }
        .store-btn.coming-soon:hover { transform: none; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .store-icon { width: 28px; height: 28px; flex-shrink: 0; }
        .store-text { text-align: left; line-height: 1.2; }
        .store-text-small { font-size: 10px; font-weight: 400; opacity: 0.8; letter-spacing: 0.5px; }
        .store-text-big { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
        .coming-badge { display: inline-block; background: var(--primary); color: white; font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 20px; margin-left: 8px; letter-spacing: 0.5px; vertical-align: middle; }
        .links { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 24px; text-decoration: none; color: inherit; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: all 0.3s; width: 220px; text-align: center; border: 2px solid transparent; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 15px 40px rgba(212, 115, 94, 0.15); }
        .card h3 { color: var(--primary); margin: 0 0 10px 0; font-size: 1.4rem; }
        .card p { margin: 0; color: #888; font-size: 0.95rem; }
        footer { margin-top: 80px; color: #bbb; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="hero">
        <img src="noms_logo.png" alt="NOMS Logo" class="main-logo">
        <h1>NOMS</h1>
        <p class="tagline">Visual Food Journal & Sticker Diary</p>
    </div>

    <div class="store-buttons">
        <a href="https://apps.apple.com/app/id6759185418" class="store-btn" target="_blank">
            <svg class="store-icon" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
            <div class="store-text">
                <div class="store-text-small">Download on the</div>
                <div class="store-text-big">App Store</div>
            </div>
        </a>
        <div class="store-btn coming-soon">
            <svg class="store-icon" viewBox="0 0 512 512"><path d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l256.6-256L47 0zm425.2 225.6l-58.9-34.1-65.7 64.5 65.7 64.5 60.1-34.1c18-14.3 18-46.5-1.2-60.8zM104.6 499l280.8-161.2-60.1-60.1L104.6 499z" fill="#fff"/></svg>
            <div class="store-text">
                <div class="store-text-small">Get it on</div>
                <div class="store-text-big">Google Play <span class="coming-badge">SOON</span></div>
            </div>
        </div>
    </div>

    <div class="links">
        <a href="privacy-policy.html" class="card">
            <h3>Privacy</h3>
            <p>How we protect your data</p>
        </a>
        <a href="terms-of-use.html" class="card">
            <h3>Terms</h3>
            <p>App usage & subscriptions</p>
        </a>
    </div>
    <footer>© 2026 NOMS App. Made for foodies.</footer>
</body>
</html>

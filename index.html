<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOMS - Visual Food Journal & Sticker Diary</title>
    <link rel="icon" type="image/png" href="noms_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #D4735E; --primary-light: #E8956F; --bg: #FAF9F7; --text: #2D2D2D; --muted: #999; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); min-height: 100vh; }
        .hero {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 85vh; padding: 60px 24px 40px; text-align: center; position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(212,115,94,0.08) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -55%); pointer-events: none;
        }
        .logo-wrap { position: relative; margin-bottom: 28px; }
        .main-logo {
            width: 110px; height: 110px; border-radius: 28px;
            filter: drop-shadow(0 12px 24px rgba(212, 115, 94, 0.25)); transition: transform 0.4s ease;
        }
        .main-logo:hover { transform: scale(1.08) rotate(3deg); }
        .app-name { font-size: 3.2rem; font-weight: 800; color: var(--text); letter-spacing: -2px; line-height: 1; }
        .app-name span { color: var(--primary); }
        .tagline { color: var(--muted); font-size: 1.1rem; font-weight: 400; margin-top: 12px; letter-spacing: 0.2px; }
        .store-buttons { display: flex; gap: 14px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
        .store-btn {
            display: inline-flex; align-items: center; gap: 11px; padding: 12px 24px; border-radius: 14px;
            text-decoration: none; color: white; font-family: 'Inter', sans-serif; transition: all 0.3s ease;
            background: #111; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .store-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .store-icon { width: 24px; height: 24px; flex-shrink: 0; }
        .store-text { text-align: left; line-height: 1.15; }
        .store-text-small { font-size: 9px; font-weight: 500; opacity: 0.75; letter-spacing: 0.4px; text-transform: uppercase; }
        .store-text-big { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
        .divider { width: 40px; height: 3px; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 2px; margin: 0 auto; }
        .footer-section { padding: 40px 24px 48px; text-align: center; }
        .legal-links { display: flex; gap: 32px; justify-content: center; margin-top: 20px; }
        .legal-links a {
            color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500;
            transition: color 0.2s; position: relative;
        }
        .legal-links a:hover { color: var(--primary); }
        .legal-links a::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1.5px;
            background: var(--primary); transition: width 0.2s;
        }
        .legal-links a:hover::after { width: 100%; }
        .copyright { color: #ccc; font-size: 0.8rem; margin-top: 24px; }
        @media (max-width: 480px) {
            .app-name { font-size: 2.6rem; }
            .tagline { font-size: 1rem; }
            .store-buttons { flex-direction: column; align-items: center; }
            .store-btn { width: 220px; justify-content: center; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="logo-wrap">
            <img src="noms_logo.png" alt="NOMS Logo" class="main-logo">
        </div>
        <h1 class="app-name">N<span>O</span>MS</h1>
        <p class="tagline">Visual Food Journal & Sticker Diary</p>

        <div class="store-buttons">
            <a href="https://apps.apple.com/app/id6759185418" class="store-btn" target="_blank">
                <svg class="store-icon" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                <div class="store-text">
                    <div class="store-text-small">Download on the</div>
                    <div class="store-text-big">App Store</div>
                </div>
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.phamtiendat1099.noms" class="store-btn" target="_blank">
                <svg class="store-icon" viewBox="0 0 512 512"><path d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l256.6-256L47 0zm425.2 225.6l-58.9-34.1-65.7 64.5 65.7 64.5 60.1-34.1c18-14.3 18-46.5-1.2-60.8zM104.6 499l280.8-161.2-60.1-60.1L104.6 499z" fill="#fff"/></svg>
                <div class="store-text">
                    <div class="store-text-small">Get it on</div>
                    <div class="store-text-big">Google Play</div>
                </div>
            </a>
        </div>
    </section>

    <div class="divider"></div>

    <section class="footer-section">
        <div class="legal-links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-use.html">Terms of Use</a>
        </div>
        <p class="copyright">© 2026 NOMS. Made with ♥ for foodies.</p>
    </section>

</body>
</html>
